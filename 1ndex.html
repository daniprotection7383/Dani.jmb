<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR0 - Group Conference</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a0b10; --panel: #161b22; --accent: #8a2be2; --others-bg: #21262d; --text: #e6edf3; --neon: #00f2ff; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background-color: var(--bg); color: var(--text); overflow: hidden; }
        
        /* LAYOUT VIDEO GRUP */
        #video-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 500; display: none; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px; padding: 10px; box-sizing: border-box; align-content: center;
        }
        .video-wrapper { position: relative; width: 100%; background: #000; border-radius: 10px; overflow: hidden; border: 2px solid var(--accent); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .user-label { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 5px; font-size: 12px; color: var(--neon); }

        #chat-app { display: flex; height: 100%; width: 100%; flex-direction: column; }
        header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); }
        .profile-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon); cursor: pointer; object-fit: cover; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: var(--bg); }
        
        /* BUBBLE CHAT */
        .msg-wrapper { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; }
        .msg-wrapper.me { align-self: flex-end; flex-direction: row; }
        .msg-wrapper.others { align-self: flex-start; flex-direction: row-reverse; }
        .msg-content { padding: 10px 15px; border-radius: 12px; position: relative; word-break: break-word; }
        .msg-wrapper.me .msg-content { background: var(--accent); border-bottom-right-radius: 2px; }
        .msg-wrapper.others .msg-content { background: var(--others-bg); border-bottom-left-radius: 2px; }
        .msg-pp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--neon); }

        footer { height: 70px; padding: 0 10px; background: var(--panel); display: flex; align-items: center; gap: 8px; }
        .btn-call { background: var(--neon); color: #000; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; border: none; }
        .btn-hangup { background: #ff4444; color: white; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 600; display: none; padding: 10px 30px; border-radius: 30px; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="video-container"></div>
<button id="hangup-all" class="btn-hangup" onclick="leaveGroupCall()">KELUAR GRUP</button>

<div id="chat-app">
    <header>
        <div style="display: flex; align-items: center; gap: 8px;">
            <img id="my-pp" class="profile-btn" src="https://via.placeholder.com/40">
            <span id="display-name" style="color: var(--neon); font-weight: bold;"></span>
        </div>
        <button class="btn-call" onclick="startGroupCall()">Mulai Video Grup</button>
    </header>
    <div id="chat-box"></div>
    <footer>
        <input type="text" id="msg-input" style="flex:1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #0d1117; color: white;">
        <button onclick="sendMsg()" style="padding: 10px 20px; background: var(--accent); color: white; border-radius: 8px; border: none;">KIRIM</button>
    </footer>
</div>

<script>
    // Konfigurasi tetap sama
    const firebaseConfig = {
        apiKey: "AIzaSyAXK0vszoK1LJ3ksLp2",
        databaseURL: "https://chatan-76693-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = { nama: "User_" + Math.floor(Math.random()*1000), id: "USER_" + Date.now() };
    let myStream;
    let peer;
    let peers = {}; // Simpan koneksi ke user lain

    // Inisialisasi Peer
    peer = new Peer(currentUser.id);

    // Dengerin kalau ada yang nelpon
    peer.on('call', call => {
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            call.answer(stream);
            setupVideo(call, stream);
        });
    });

    async function startGroupCall() {
        document.getElementById('video-container').style.display = 'grid';
        document.getElementById('hangup-all').style.display = 'block';
        
        myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        addVideoStream(currentUser.id, myStream, true);

        // Kasih tau orang lain di database kalau kita lagi "online" di video grup
        db.ref('active_calls').child(currentUser.id).set({ nama: currentUser.nama });

        // Hubungi semua orang yang udah online duluan
        db.ref('active_calls').once('value', snap => {
            snap.forEach(child => {
                const userId = child.key;
                if (userId !== currentUser.id) {
                    const call = peer.call(userId, myStream);
                    setupVideo(call);
                }
            });
        });
    }

    function setupVideo(call) {
        call.on('stream', remoteStream => {
            addVideoStream(call.peer, remoteStream);
        });
        call.on('close', () => {
            removeVideo(call.peer);
        });
        peers[call.peer] = call;
    }

    function addVideoStream(userId, stream, isMe = false) {
        if(document.getElementById('vid_' + userId)) return;

        const wrapper = document.createElement('div');
        wrapper.id = 'vid_' + userId;
        wrapper.className = 'video-wrapper';
        
        const video = document.createElement('video');
        video.srcObject = stream;
        video.autoplay = true;
        if(isMe) video.muted = true; // Biar suara sendiri nggak mantul

        const label = document.createElement('div');
        label.className = 'user-label';
        label.innerText = isMe ? "Anda" : userId;

        wrapper.append(video, label);
        document.getElementById('video-container').append(wrapper);
    }

    function removeVideo(userId) {
        const vid = document.getElementById('vid_' + userId);
        if(vid) vid.remove();
    }

    function leaveGroupCall() {
        // Stop kamera
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        
        // Tutup semua koneksi
        for (let id in peers) {
            if (peers[id]) peers[id].close();
        }

        // Hapus status di database
        db.ref('active_calls').child(currentUser.id).remove();
        
        document.getElementById('video-container').style.display = 'none';
        document.getElementById('video-container').innerHTML = '';
        document.getElementById('hangup-all').style.display = 'none';
    }

    // Fungsi chat standard (Biar tetep bisa chat)
    function sendMsg() {
        const txt = document.getElementById('msg-input').value;
        if(!txt) return;
        db.ref("global_chat").push({ sender: currentUser.nama, text: txt, avatar: "https://via.placeholder.com/40" });
        document.getElementById('msg-input').value = "";
    }

    db.ref("global_chat").limitToLast(10).on("value", snap => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            const div = document.createElement('div');
            div.className = `msg-wrapper ${m.sender === currentUser.nama ? 'me' : 'others'}`;
            div.innerHTML = `<div class="msg-content">${m.text}</div><img src="${m.avatar}" class="msg-pp">`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
