<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR0 - Private Chat Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a0b10; --panel: #161b22; --accent: #8a2be2; --others-bg: #21262d; --text: #e6edf3; --neon: #00f2ff; --danger: #ff4444; --purple-neon: #a333ff; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background-color: var(--bg); color: var(--text); overflow: hidden; }

        /* Login Screen */
        .login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 0 20px; }
        .login-box { background: var(--panel); padding: 40px 25px; border-radius: 15px; border: 1px solid var(--accent); text-align: center; width: 100%; max-width: 320px; box-shadow: 0 0 20px rgba(138, 43, 226, 0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #0d1117; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Chat App UI */
        #chat-app { display: none; height: 100%; width: 100%; flex-direction: column; position: fixed; top: 0; left: 0; }
        header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); }
        .profile-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon); cursor: pointer; object-fit: cover; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: var(--bg); }
        
        /* Bubble Chat Fix */
        .msg-wrapper { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; width: fit-content; }
        .msg-wrapper.me { align-self: flex-end; flex-direction: row; }
        .msg-wrapper.me .msg-content { background: var(--accent); border-radius: 15px 15px 2px 15px; }
        .msg-wrapper.others { align-self: flex-start; flex-direction: row-reverse; }
        .msg-wrapper.others .msg-content { background: var(--others-bg); border-radius: 15px 15px 15px 2px; }
        
        .msg-content { padding: 10px 15px; word-break: break-word; cursor: pointer; min-width: 50px; position: relative; }
        .msg-name { font-size: 10px; color: var(--neon); margin-bottom: 5px; font-weight: bold; }
        .msg-pp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--neon); flex-shrink: 0; }

        footer { height: 70px; padding: 0 10px; background: var(--panel); display: flex; align-items: center; gap: 8px; border-top: 1px solid #333; }
        .call-btn { background: none; border: 1px solid var(--neon); color: var(--neon); width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #admin-panel-btn { display: none; background: #333; border: 1px solid var(--neon); color: var(--neon); padding: 5px 10px; font-size: 10px; border-radius: 5px; }
        
        .vn-btn { width: 60px; background: #222; border: 1px solid var(--accent); font-size: 11px; color: white; border-radius: 8px; height: 40px; }
        .recording { background: #ff4444; animation: blink 1s infinite; }
        
        /* Video Area */
        #video-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .video-box { width: 90%; max-width: 400px; border-radius: 15px; border: 2px solid var(--neon); background: #000; overflow: hidden; position: relative; }
        video { width: 100%; height: auto; display: block; background: #222; }
        .local-video { width: 100px; position: absolute; bottom: 10px; right: 10px; border: 1px solid white; border-radius: 10px; }
        
        /* Modal Style Update */
        #admin-modal, #call-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #121212; width: 90%; max-width: 360px; border-radius: 20px; border: 2px solid var(--neon); overflow: hidden; animation: slideUp 0.3s ease; }
        .modal-header { padding: 18px; background: var(--purple-neon); color: white; font-weight: bold; text-align: center; text-transform: uppercase; font-size: 14px; }
        .modal-body { padding: 15px; max-height: 400px; overflow-y: auto; }
        
        .user-item-call { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .user-info-call b { color: var(--neon); font-size: 15px; display: block; }
        .user-info-call span { font-size: 11px; color: #888; }
        .btn-panggil-action { background: var(--neon); color: #000; padding: 8px 15px; font-weight: 800; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-batal-modal { background: #333; color: white; width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .modal-footer { padding: 15px; }

        /* FIX GAMBAR LEBAR */
        .msg-img { max-width: 200px; max-height: 250px; object-fit: cover; border-radius: 10px; margin-top: 5px; border: 1px solid var(--neon); cursor: pointer; display: block; }

        .photo-btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--neon); background: rgba(0, 242, 255, 0.1); display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .photo-btn svg { width: 22px; height: 22px; fill: var(--neon); }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes blink { 50% { opacity: 0.5; } }
        audio { max-width: 200px; height: 35px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-box">
        <h2 style="color: var(--neon); margin-top: 0;">ACCESS GRANTED</h2>
        <input type="text" id="u-name" placeholder="Username">
        <input type="password" id="u-pass" placeholder="Password">
        <button onclick="login()">ENTER SYSTEM</button>
        <p id="err" style="color: #ff4444; font-size: 12px; margin-top: 10px;"></p>
    </div>
</div>

<div id="chat-app">
    <header>
        <div style="display: flex; align-items: center; gap: 5px;">
            <label for="pp-input"><img id="my-pp" class="profile-btn" src="https://via.placeholder.com/40"></label>
            <input type="file" id="pp-input" hidden accept="image/*" onchange="updatePP(this)">
            <span id="display-name" style="color: var(--neon); font-weight: bold; font-size: 13px;"></span>
            <button id="admin-panel-btn" onclick="manageUsers()">MANAGE</button>
            <button class="call-btn" onclick="openCallPicker('voice')">📞</button>
            <button class="call-btn" onclick="openCallPicker('video')">🖥️</button>
        </div>
        <button onclick="location.reload()" style="width: auto; padding: 5px 10px; background: #333; font-size: 12px; border: none; border-radius: 5px; color: white;">OUT</button>
    </header>
    <div id="chat-box"></div>
    <footer>
        <label for="img-send" class="photo-btn">
            <svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 15a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0-2a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>
        </label>
        <input type="file" id="img-send" hidden accept="image/*" onchange="sendPhoto(this)">
        <input type="text" id="msg-input" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button id="vn-btn" class="vn-btn" onclick="toggleVN()">VOICE</button>
        <button onclick="sendMsg()" style="width: 70px; font-weight: bold;">SEND</button>
    </footer>
</div>

<div id="call-modal">
    <div class="modal-content">
        <div id="call-modal-title" class="modal-header">💻 MONITOR / VC</div>
        <div class="modal-body" id="call-list-container"></div>
        <div class="modal-footer"><button class="btn-batal-modal" onclick="closeCallModal()">BATAL</button></div>
    </div>
</div>

<div id="admin-modal">
    <div class="modal-content">
        <div class="modal-header">CONTROL PANEL</div>
        <div class="modal-body">
            <button style="width:100%; padding:12px; background:var(--neon); color:black; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;" onclick="addUserFlow()">+ ADD NEW MEMBER</button>
            <button style="width:100%; padding:10px; background:var(--danger); color:white; border:none; border-radius:8px; font-size:12px; margin-bottom:15px;" onclick="clearAllChatsFlow()">🔥 CLEAR ALL CHATS</button>
            <div id="user-list-container"></div>
        </div>
        <div class="modal-footer"><button class="btn-batal-modal" onclick="closeModal()">CLOSE</button></div>
    </div>
</div>

<div id="video-grid">
    <div class="video-box">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" class="local-video" autoplay playsinline muted></video>
    </div>
    <button onclick="endCallUI()" style="margin-top: 20px; width: 150px; background: #ff4444; border: none; color: white; padding: 10px; border-radius: 8px;">TUTUP</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAXK0vszoK1LJ3ksLp2",
        authDomain: "chatan-76693.firebaseapp.com",
        projectId: "chatan-76693",
        storageBucket: "chatan-76693.appspot.com",
        messagingSenderId: "497865591363",
        appId: "1:497865591363:web:2a9cb1619623910f115ce9",
        measurementId: "G-6SSJ5EK115",
        databaseURL: "https://chatan-76693-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const adminUser = {
        "dani": { pass: "dani123", nama: "DANI OWNER☑️", role: "admin" },
        "rafa": { pass: "RAFA12", nama: "RAFA" },
        "repan": { pass: "repan72", nama: "REPAN" }
    };
    
    let daftarUser = { ...adminUser };
    let currentUser = null; 

    db.ref("users_list").on("value", (snap) => {
        const dataServer = snap.val() || {};
        daftarUser = { ...adminUser, ...dataServer };
        if(document.getElementById('admin-modal').style.display === 'flex') renderUserList();
    });

    function login() {
        const u = document.getElementById('u-name').value.toLowerCase().trim();
        const p = document.getElementById('u-pass').value;
        if(daftarUser[u] && String(daftarUser[u].pass) === String(p)) {
            currentUser = daftarUser[u]; currentUser.id = u;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-app').style.display = 'flex';
            document.getElementById('display-name').innerText = currentUser.nama;
            if(currentUser.role === 'admin') document.getElementById('admin-panel-btn').style.display = 'block';
            const savedPP = localStorage.getItem('pp_' + u);
            if(savedPP) document.getElementById('my-pp').src = savedPP;
            initPeer(u); loadChats();
        } else {
            document.getElementById('err').innerText = "Data Salah!";
        }
    }

    let currentCallType = "";
    function openCallPicker(type) {
        currentCallType = type;
        document.getElementById('call-modal-title').innerText = type === 'voice' ? '📞 PANGGILAN SUARA' : '💻 MONITOR / VC';
        document.getElementById('call-modal').style.display = 'flex';
        const container = document.getElementById('call-list-container');
        container.innerHTML = "";
        Object.keys(daftarUser).forEach(id => {
            if(id === currentUser.id) return;
            const u = daftarUser[id];
            container.innerHTML += `<div class="user-item-call"><div class="user-info-call"><b>${u.nama}</b><span>Status: Online</span></div><button class="btn-panggil-action" onclick="startCallFlow('${id}')">PANGGIL</button></div>`;
        });
    }
    function closeCallModal() { document.getElementById('call-modal').style.display = 'none'; }
    function startCallFlow(targetId) {
        closeCallModal();
        const mediaOpts = currentCallType === 'voice' ? { audio: true } : { audio: true, video: true };
        navigator.mediaDevices.getUserMedia(mediaOpts).then(s => { localStream = s; handleCall(peer.call(targetId, s), currentCallType === 'video'); });
    }

    function manageUsers() { document.getElementById('admin-modal').style.display = 'flex'; renderUserList(); }
    function closeModal() { document.getElementById('admin-modal').style.display = 'none'; }
    
    // FITUR HAPUS MEMBER ADA DI SINI
    function renderUserList() {
        const container = document.getElementById('user-list-container'); container.innerHTML = "";
        Object.keys(daftarUser).forEach(id => {
            const u = daftarUser[id];
            // Cek biar akun utama nggak sengaja kehapus dari list
            const isHardcoded = (id === "dani" || id === "rafa" || id === "repan");
            
            container.innerHTML += `
                <div class="user-item-call" style="background:#0d1117; flex-direction: column; align-items: flex-start; gap: 10px;">
                    <div class="user-info-call"><b>${u.nama}</b><span>ID: ${id} | PW: ${u.pass}</span></div>
                    <div style="display: flex; gap: 5px; width: 100%;">
                        <button class="btn-panggil-action" style="background:var(--accent); color:white; flex: 1;" onclick="editUserFlow('${id}')">EDIT</button>
                        ${!isHardcoded ? `<button class="btn-panggil-action" style="background:var(--danger); color:white; flex: 1;" onclick="deleteUser('${id}')">HAPUS</button>` : ''}
                    </div>
                </div>`;
        });
    }

    function deleteUser(id) {
        if(confirm("Yakin mau hapus member: " + id + "?")) {
            db.ref("users_list/" + id).remove()
                .then(() => alert("Member Berhasil Dihapus!"))
                .catch((e) => alert("Gagal Menghapus!"));
        }
    }

    function addUserFlow() {
        const id = prompt("Username:").toLowerCase().trim(); if(!id || daftarUser[id]) return;
        const nm = prompt("Nama:"); const ps = prompt("Pass:");
        if(nm && ps) db.ref("users_list/" + id).set({ nama: nm, pass: ps });
    }
    function editUserFlow(id) {
        const nm = prompt("Ganti Nama:", daftarUser[id].nama); const ps = prompt("Ganti Pass:", daftarUser[id].pass);
        if(nm && ps) db.ref("users_list/" + id).update({ nama: nm, pass: ps });
    }
    function clearAllChatsFlow() { if(confirm("HAPUS SEMUA CHAT?")) db.ref("global_chat").remove(); }

    function loadChats() {
        db.ref("global_chat").limitToLast(50).on("value", (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                const m = data[id]; const isMe = (m.sender === currentUser.nama);
                let contentHTML = m.text ? `<div>${m.text}</div>` : (m.vn ? `<audio controls src="${m.vn}"></audio>` : `<img src="${m.photo}" class="msg-img" onclick="savePhoto('${m.photo}')">`);
                box.innerHTML += `<div class="msg-wrapper ${isMe ? 'me' : 'others'}"><div class="msg-content" onclick="deleteMsg('${id}', '${m.sender}')"><div class="msg-name">${m.sender}</div>${contentHTML}</div><img src="${m.avatar || 'https://via.placeholder.com/40'}" class="msg-pp"></div>`;
            }
            box.scrollTop = box.scrollHeight;
        });
    }
    function savePhoto(url) { if(confirm("Simpan foto?")) { const a = document.createElement('a'); a.href = url; a.download = `AR0_${Date.now()}.png`; a.click(); } }
    function sendMsg() {
        const t = document.getElementById('msg-input').value.trim(); if(!t) return;
        db.ref("global_chat").push({ sender: currentUser.nama, text: t, avatar: document.getElementById('my-pp').src, time: Date.now() });
        document.getElementById('msg-input').value = "";
    }
    function sendPhoto(input) {
        if(input.files[0]) {
            const r = new FileReader(); r.onload = (e) => { db.ref("global_chat").push({ sender: currentUser.nama, photo: e.target.result, avatar: document.getElementById('my-pp').src, time: Date.now() }); };
            r.readAsDataURL(input.files[0]);
        }
    }
    let mediaRecorder, audioChunks = [], isRecording = false;
    async function toggleVN() {
        const btn = document.getElementById('vn-btn');
        if(!isRecording) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const r = new FileReader(); r.readAsDataURL(new Blob(audioChunks, { type: 'audio/webm' }));
                    r.onloadend = () => { db.ref("global_chat").push({ sender: currentUser.nama, vn: r.result, avatar: document.getElementById('my-pp').src, time: Date.now() }); };
                };
                mediaRecorder.start(); isRecording = true; btn.classList.add('recording'); btn.innerText = "STOP";
            } catch(e) { alert("ERROR MIC"); }
        } else { mediaRecorder.stop(); isRecording = false; btn.classList.remove('recording'); btn.innerText = "VOICE"; }
    }
    let peer, localStream, activeCall;
    function initPeer(id) {
        peer = new Peer(id);
        peer.on('call', (call) => { if(confirm("Panggilan Masuk!")) { navigator.mediaDevices.getUserMedia({ audio: true, video: true }).then(s => { localStream = s; call.answer(s); handleCall(call, true); }); } });
    }
    function handleCall(call, isVideo) {
        activeCall = call; if(isVideo) document.getElementById('video-grid').style.display = 'flex';
        call.on('stream', (rs) => { document.getElementById('remote-video').srcObject = rs; document.getElementById('local-video').srcObject = localStream; });
        call.on('close', () => endCallUI());
    }
    function endCallUI() { if(activeCall) activeCall.close(); if(localStream) localStream.getTracks().forEach(t => t.stop()); document.getElementById('video-grid').style.display = 'none'; }
    function deleteMsg(id, name) { if(currentUser.role === 'admin' || name === currentUser.nama) { if(confirm("Hapus?")) db.ref("global_chat/" + id).remove(); } }
    function updatePP(i) {
        if(i.files[0]) {
            const r = new FileReader(); r.onload = (e) => { document.getElementById('my-pp').src = e.target.result; localStorage.setItem('pp_' + currentUser.id, e.target.result); };
            r.readAsDataURL(i.files[0]);
        }
    }
</script>
</body>
    </html>
